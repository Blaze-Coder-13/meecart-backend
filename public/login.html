<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Meecart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2d6a4f; --green-light: #52b788;
      --cream: #f9f5f0; --text: #1a1a1a;
      --muted: #6b7280; --border: #e5e0d8; --error: #dc2626;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--cream);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .card {
      background: white; border-radius: 20px; padding: 48px 40px;
      width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo-img { width: 80px; height: 80px; border-radius: 16px; object-fit: contain; margin-bottom: 12px; }
    .logo-emoji { font-size: 56px; display: block; margin-bottom: 8px; }
    .logo h1 { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--green); letter-spacing: -0.5px; }
    .logo p { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    input {
      width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 16px; font-family: inherit;
      color: var(--text); background: white; transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: var(--green-light); }
    .phone-input-wrap { display: flex; gap: 8px; }
    .country-code {
      padding: 14px 12px; border: 1.5px solid var(--border); border-radius: 12px;
      background: #f5f5f5; font-size: 14px; font-weight: 600; color: var(--muted);
      white-space: nowrap; min-width: 60px; text-align: center;
    }
    .btn {
      width: 100%; padding: 15px; background: var(--green); color: white;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn:hover { background: #245a3f; }
    .btn:disabled { background: #a0b5ac; cursor: not-allowed; }
    .otp-section { display: none; }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
    .otp-inputs input { width: 48px; height: 56px; text-align: center; font-size: 22px; font-weight: 700; border-radius: 12px; padding: 0; }
    .resend-row { text-align: center; margin-top: 16px; font-size: 14px; color: var(--muted); }
    .resend-btn { background: none; border: none; color: var(--green); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 14px; }
    .error-msg { color: var(--error); font-size: 13px; margin-top: 8px; display: none; }
    .success-msg { background: #ecfdf5; color: var(--green); padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
    .back-btn { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; font-family: inherit; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
    .back-btn:hover { color: var(--text); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo" id="logoSection">
    <span class="logo-emoji">🛒</span>
    <h1 id="appName">Meecart</h1>
    <p>Fresh vegetables, delivered daily</p>
  </div>

  <!-- Step 1: Phone -->
  <div id="phoneSection">
    <div class="form-group">
      <label>Mobile Number</label>
      <div class="phone-input-wrap">
        <div class="country-code">+91</div>
        <input type="tel" id="phoneInput" placeholder="98765 43210" maxlength="10" inputmode="numeric" />
      </div>
    </div>
    <div class="error-msg" id="phoneError"></div>
    <button class="btn" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
  </div>

  <!-- Step 2: OTP -->
  <div class="otp-section" id="otpSection">
    <button class="back-btn" onclick="goBack()">← Change number</button>
    <div class="success-msg" id="otpSentMsg">
      OTP sent to +91 <span id="sentPhone"></span>
    </div>
    <div class="form-group">
      <label>Enter 6-digit OTP</label>
      <div class="otp-inputs">
        <input type="tel" maxlength="1" class="otp-digit" inputmode="numeric" />
        <input type="tel" maxlength="1" class="otp-digit" inputmode="numeric" />
        <input type="tel" maxlength="1" class="otp-digit" inputmode="numeric" />
        <input type="tel" maxlength="1" class="otp-digit" inputmode="numeric" />
        <input type="tel" maxlength="1" class="otp-digit" inputmode="numeric" />
        <input type="tel" maxlength="1" class="otp-digit" inputmode="numeric" />
      </div>
    </div>
    <div class="error-msg" id="otpError"></div>
    <button class="btn" id="verifyBtn" onclick="verifyOTP()">Verify & Login</button>
    <div class="resend-row">
      Didn't receive it? <button class="resend-btn" onclick="sendOTP(true)">Resend OTP</button>
    </div>
  </div>
</div>

<script>
  const API = '';

  // Load app logo and name from settings
  async function loadAppBranding() {
    try {
      const res = await fetch(`${API}/api/settings`);
      const data = await res.json();
      if (data.app_name) document.getElementById('appName').textContent = data.app_name;
      if (data.app_logo_url) {
        const logoSection = document.getElementById('logoSection');
        logoSection.innerHTML = `
          <img src="${data.app_logo_url}" class="logo-img" onerror="this.outerHTML='<span class=logo-emoji>🛒</span>'" />
          <h1>${data.app_name || 'Meecart'}</h1>
          <p>Fresh vegetables, delivered daily</p>
        `;
      }
      if (data.app_name) document.title = `Login – ${data.app_name}`;
    } catch {}
  }
  loadAppBranding();

  // Auto-tab OTP digits
  document.querySelectorAll('.otp-digit').forEach((input, i, all) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '');
      if (input.value && i < all.length - 1) all[i + 1].focus();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !input.value && i > 0) all[i - 1].focus();
    });
    input.addEventListener('paste', e => {
      const paste = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      [...paste].forEach((ch, j) => { if (all[j]) all[j].value = ch; });
      if (all[paste.length - 1]) all[paste.length - 1].focus();
      e.preventDefault();
    });
  });

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }
  function hideError(id) { document.getElementById(id).style.display = 'none'; }

  async function sendOTP(isResend = false) {
    const phone = document.getElementById('phoneInput').value.trim();
    hideError('phoneError');
    if (!/^\d{10}$/.test(phone)) { showError('phoneError', 'Enter a valid 10-digit mobile number'); return; }
    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const res = await fetch(`${API}/api/auth/send-otp`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, purpose: 'admin' })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to send OTP');
      document.getElementById('phoneSection').style.display = 'none';
      document.getElementById('otpSection').style.display = 'block';
      document.getElementById('sentPhone').textContent = phone;
      document.getElementById('otpSentMsg').style.display = 'block';
      document.querySelector('.otp-digit').focus();
    } catch (err) {
      showError('phoneError', err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Send OTP';
    }
  }

  async function verifyOTP() {
    const digits = [...document.querySelectorAll('.otp-digit')].map(i => i.value).join('');
    const phone = document.getElementById('phoneInput').value.trim();
    hideError('otpError');
    if (digits.length !== 6) { showError('otpError', 'Enter the complete 6-digit OTP'); return; }
    const btn = document.getElementById('verifyBtn');
    btn.disabled = true; btn.textContent = 'Verifying…';
    try {
      const res = await fetch(`${API}/api/auth/admin-login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, code: digits })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Verification failed');
      localStorage.setItem('meecart_token', data.token);
      localStorage.setItem('meecart_user', JSON.stringify(data.user));
      if (data.user.role === 'admin') {
        window.location.href = '/admin/';
      } else {
        window.location.href = '/';
      }
    } catch (err) {
      showError('otpError', err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Verify & Login';
    }
  }

  function goBack() {
    document.getElementById('phoneSection').style.display = 'block';
    document.getElementById('otpSection').style.display = 'none';
    document.querySelectorAll('.otp-digit').forEach(i => i.value = '');
  }

  if (localStorage.getItem('meecart_token')) {
    const user = JSON.parse(localStorage.getItem('meecart_user') || '{}');
    window.location.href = user.role === 'admin' ? '/admin/' : '/';
  }
</script>
</body>
</html>
